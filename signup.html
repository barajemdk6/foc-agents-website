<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up – FOC Agents</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <a class="brand" href="index.html" style="margin-bottom:10px; display:inline-flex;">
        <span class="brand-badge" aria-hidden="true">FOC</span>
        <span class="brand-text">FOC Agents</span>
      </a>
      <h1>Create your account</h1>
      <p class="subtle">Start your 7-day free trial</p>
      <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
        <input class="input" type="text" placeholder="Full Name" required>
        <input class="input" type="email" placeholder="Email" required>
        <input class="input" type="password" placeholder="Password" required>
        <button class="button block" type="submit">Create Account</button>
      </form>
    </div>
  </div>
  <script src="assets/js/main.js"></script>
</body>
</html>
